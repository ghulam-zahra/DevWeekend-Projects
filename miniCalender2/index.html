<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Calendar · June 2026</title>
  <!-- separate CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calendar">
    <!-- header: month + year + navigation -->
    <div class="calendar-header">
      <div class="month-year">
        <span class="month" id="monthDisplay">June</span>
        <span class="year" id="yearDisplay">2026</span>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn" aria-label="Previous month">←</button>
        <button class="nav-btn" id="nextBtn" aria-label="Next month">→</button>
      </div>
    </div>

    <!-- weekday labels -->
    <div class="weekdays">
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
      <span>Sun</span>
    </div>

    <!-- days grid -->
    <div class="days-grid" id="daysGrid"></div>

    <!-- tiny footer (optional) -->
    <div class="calendar-footer"></div>
  </div>

  <!-- separate JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
