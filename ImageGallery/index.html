<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✿ Petal Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <span class="logo">✿ Petal</span>
      <p class="tagline">a little gallery for lovely things</p>
    </div>
  </header>

  <main>

    <!-- Controls -->
    <div class="controls">
      <button class="btn active" data-direction="horizontal">↔ Horizontal Slide</button>
      <button class="btn" data-direction="vertical">↕ Vertical Slide</button>
      <button class="btn" id="addBtn">＋ Add Image</button>
    </div>

    <!-- Gallery Wrapper -->
    <div class="gallery-container" id="galleryContainer">

      <!-- Slider -->
      <div class="slider-wrapper" id="sliderWrapper">
        <div class="slider" id="slider">
          <!-- Cards injected by JS -->
        </div>
      </div>

      <!-- Prev / Next -->
      <button class="nav-btn prev" id="prevBtn">&#8249;</button>
      <button class="nav-btn next" id="nextBtn">&#8250;</button>

      <!-- Dots -->
      <div class="dots" id="dots"></div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightboxClose">&#10005;</button>
      <img class="lightbox-img" id="lightboxImg" src="" alt="Enlarged" />
      <p class="lightbox-caption" id="lightboxCaption"></p>
    </div>

    <!-- Add Image Modal -->
    <div class="modal" id="modal">
      <div class="modal-box">
        <h2>Add a New Image ✿</h2>
        <label>Image URL</label>
        <input type="text" id="imgUrl" placeholder="https://example.com/photo.jpg" />
        <label>Caption</label>
        <input type="text" id="imgCaption" placeholder="Something sweet…" />
        <div class="modal-actions">
          <button class="btn" id="modalCancel">Cancel</button>
          <button class="btn primary" id="modalAdd">Add ✿</button>
        </div>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
