<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List · Multi-file</title>
  <!-- Font Awesome (optional but nice) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- separate CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="todo-card">
    <h1>
      <i class="fas fa-list-check"></i> 
      To-Do List
    </h1>

    <!-- Add task row -->
    <div class="add-section">
      <input type="text" id="taskInput" placeholder="Add your task" />
      <button id="addBtn">
        <i class="fas fa-plus-circle"></i> Add
      </button>
    </div>

    <!-- Task list -->
    <ul class="task-list" id="taskList">
      <!-- static demo tasks (mirroring the screenshot) -->
      <li class="task-item" data-id="1">
        <input type="checkbox" class="task-checkbox" />
        <span class="task-text">Create a JavaScript project</span>
        <button class="delete-btn"><i class="fas fa-trash-alt"></i></button>
      </li>
      <li class="task-item" data-id="2">
        <input type="checkbox" class="task-checkbox" />
        <span class="task-text">Upload it online</span>
        <button class="delete-btn"><i class="fas fa-trash-alt"></i></button>
      </li>
      <li class="task-item completed" data-id="3">
        <input type="checkbox" class="task-checkbox" checked />
        <span class="task-text">Add project link in the resume</span>
        <button class="delete-btn"><i class="fas fa-trash-alt"></i></button>
      </li>
    </ul>

    <!-- tiny footer (just to match the vibe) -->
    <div class="todo-footer">
      <span class="task-counter" id="taskCounter">3 tasks</span>
      <span class="clear-btn" id="clearCompleted">Clear completed</span>
    </div>
  </div>

  <!-- separate JavaScript -->
  <script src="script.js"></script>
</body>
</html>
